<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espacio Estelar Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* El lienzo ocupa toda la pantalla de fondo */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Interfaz estética superpuesta */
        .interface {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: #ffffff;
            pointer-events: none; /* Permite que el mouse pase a través y afecte al canvas */
            user-select: none;
        }

        .interface h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 230, 0, 0.6);
            margin-bottom: 10px;
            animation: pulse 4s infinite alternate;
        }

        .interface p {
            font-size: 1rem;
            color: #8a8ab0;
            letter-spacing: 2px;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.85rem;
            letter-spacing: 1px;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="interface">
        <h1>Canvas Estelar</h1>
        <p>El código aburrido se convierte en arte</p>
    </div>

    <div class="controls">
        Mueve el cursor para desviar el centro • Haz click para hipervelocidad
    </div>

    <canvas id="starfield"></canvas>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        // Configuración inicial del lienzo
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Parámetros de las estrellas
        const NUM_STARS = 400;
        let speed = 2;
        const stars = [];

        // Coordenadas del centro (pueden cambiar con el mouse)
        let centerX = canvas.width / 2;
        let centerY = canvas.height / 2;
        let targetX = centerX;
        let targetY = centerY;

        // Estructura de una estrella utilizando programación orientada a objetos
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                // Posición inicial aleatoria en un espacio 3D simulado
                this.x = (Math.random() - 0.5) * canvas.width * 2;
                this.y = (Math.random() - 0.5) * canvas.height * 2;
                this.z = Math.random() * canvas.width; // Profundidad
                this.prevZ = this.z;
            }

            update() {
                this.prevZ = this.z;
                this.z -= speed;

                // Si la estrella pasa al observador, se reinicia al fondo
                if (this.z <= 0) {
                    this.reset();
                }
            }

            draw() {
                // Proyección 3D a 2D
                // Dividir por Z crea el efecto de perspectiva (más cerca = más grande y rápido)
                const sx = (this.x / this.z) * (canvas.width * 0.8) + centerX;
                const sy = (this.y / this.z) * (canvas.height * 0.8) + centerY;

                const px = (this.x / this.prevZ) * (canvas.width * 0.8) + centerX;
                const py = (this.y / this.prevZ) * (canvas.height * 0.8) + centerY;

                // Calcular tamaño e intensidad según la cercanía
                const radius = (1 - this.z / canvas.width) * 3;
                const opacity = (1 - this.z / canvas.width);

                // Dibujar la estela de la estrella en un tono amarillo brillante
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 235, 75, ${opacity})`;
                ctx.lineWidth = radius;
                ctx.lineCap = 'round';
                ctx.moveTo(px, py);
                ctx.lineTo(sx, sy);
                ctx.stroke();
            }
        }

        // Inicializar el arreglo de estrellas
        for (let i = 0; i < NUM_STARS; i++) {
            stars.push(new Star());
        }

        // Interacción con el mouse
        window.addEventListener('mousemove', (e) => {
            // Suaviza el movimiento del centro hacia el cursor
            targetX = canvas.width / 2 + (e.clientX - canvas.width / 2) * 0.2;
            targetY = canvas.height / 2 + (e.clientY - canvas.height / 2) * 0.2;
        });

        window.addEventListener('mousedown', () => { speed = 12; }); // Hipervelocidad al presionar
        window.addEventListener('mouseup', () => { speed = 2; });    // Velocidad normal al soltar

        // Bucle de animación principal (Render Loop)
        function animate() {
            // En lugar de borrar la pantalla por completo, dejamos un rastro sutil
            // usando un fondo negro con opacidad para lograr un efecto 'glow' de velocidad.
            ctx.fillStyle = 'rgba(5, 5, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Interpolación para que el centro se mueva suavemente
            centerX += (targetX - centerX) * 0.05;
            centerY += (targetY - centerY) * 0.05;

            // Actualizar y dibujar cada estrella
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // Llama recursivamente al siguiente cuadro de animación nativo del navegador
            requestAnimationFrame(animate);
        }

        // ¡Despegue!
        animate();
    </script>
</body>
</html>
